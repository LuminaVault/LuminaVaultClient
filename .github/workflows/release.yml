name: App Store Release

# Ships the production identity (com.lumina.fernando) as a draft App Store
# upload. Manual-only until the production App Store Connect app exists —
# do not auto-fire on main until that app + match profiles are ready.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type ship-production to confirm (requires ASC app + match certs)"
        required: true
        default: ""

jobs:
  release:
    runs-on: macos-15
    timeout-minutes: 90
    # Hard stop until the operator explicitly confirms.
    if: github.event.inputs.confirm == 'ship-production'
    env:
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
      BUILD_NUMBER: ${{ github.run_number }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
      APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
      APP_STORE_CONNECT_API_KEY_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY }}
      FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD: ${{ secrets.FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('LuminaVaultClient.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Materialize Release xcconfig
        env:
          CONFIG_RELEASE_XCCONFIG: ${{ secrets.CONFIG_RELEASE_XCCONFIG }}
        run: |
          set -euo pipefail
          dest="LuminaVaultClient/Config/Config.Release.xcconfig"
          if [ -n "${CONFIG_RELEASE_XCCONFIG:-}" ]; then
            printf '%s\n' "$CONFIG_RELEASE_XCCONFIG" > "$dest"
            echo "Wrote $dest from CONFIG_RELEASE_XCCONFIG secret"
          elif [ -f "${dest}.sample" ]; then
            cp "${dest}.sample" "$dest"
            echo "Materialized $dest from sample (set CONFIG_RELEASE_XCCONFIG for real values)"
          else
            echo "Missing Release xcconfig sample" >&2
            exit 1
          fi
          for cfg in Debug Beta; do
            src="LuminaVaultClient/Config/Config.$cfg.xcconfig"
            if [ ! -f "$src" ] && [ -f "$src.sample" ]; then
              cp "$src.sample" "$src"
            fi
          done

      - name: Resolve Swift packages
        run: xcodebuild -project LuminaVaultClient.xcodeproj -resolvePackageDependencies

      - name: Build + upload draft to App Store Connect
        run: bundle exec fastlane release
