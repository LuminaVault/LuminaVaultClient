name: CI

on:
  pull_request:
    branches: [main, development]
    paths-ignore:
      - "**.md"
      - "docs/**"
  push:
    branches: [main, development]
    paths-ignore:
      - "**.md"
      - "docs/**"

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-15
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint (pinned)
        run: |
          set -euo pipefail
          curl -fsSL -o swiftlint.zip \
            "https://github.com/realm/SwiftLint/releases/download/0.63.2/portable_swiftlint.zip"
          unzip -o swiftlint.zip -d /tmp/swiftlint
      - name: SwiftLint
        run: /tmp/swiftlint/swiftlint lint --reporter github-actions-logging

  test:
    name: Run Tests
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # LuminaVaultShared ≥ 1.3.0 requires swift-tools 6.2 — Xcode 16.4 ships
      # Swift 6.1 and cannot resolve it, so we need the newest stable Xcode.
      # The "ensure iOS runtime" step below covers images that ship 26.x
      # without a preinstalled simulator runtime.
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Ensure an iOS simulator runtime is installed
        run: |
          set -euo pipefail
          if ! xcrun simctl list runtimes | grep -q "^iOS"; then
            echo "no iOS simulator runtime — downloading (one-time per image)"
            sudo xcodebuild -downloadPlatform iOS
          fi
          xcrun simctl list runtimes

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('LuminaVaultClient.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      # The real Config.*.xcconfig files are gitignored (they hold secrets).
      # CI has no secrets and tests use mocks, so materialize them from the
      # committed .sample placeholders purely to satisfy the pbxproj
      # baseConfigurationReference. Never overwrite a real file if present.
      - name: Materialize xcconfig from samples
        run: |
          set -euo pipefail
          for cfg in Debug Release Beta GoogleAuth; do
            src="LuminaVaultClient/Config/Config.$cfg.xcconfig"
            [ "$cfg" = "GoogleAuth" ] && src="LuminaVaultClient/Config/GoogleAuth.xcconfig"
            if [ ! -f "$src" ] && [ -f "$src.sample" ]; then
              cp "$src.sample" "$src"
              echo "materialized $src"
            fi
          done

      - name: Resolve Swift packages
        run: xcodebuild -project LuminaVaultClient.xcodeproj -resolvePackageDependencies

      # Pinned destination: "OS=latest" resolves to the newest installed
      # runtime for the selected Xcode — and it fails LOUDLY if the device or
      # runtime is missing instead of the old dynamic-discovery guard that
      # exit-1'd on runner image drift.
      - name: List simulator runtimes (diagnostics only)
        run: xcrun simctl list runtimes

      - name: Run unit tests (Debug)
        run: |
          set -euo pipefail
          xcodebuild test \
            -project LuminaVaultClient.xcodeproj \
            -scheme LuminaVaultClient \
            -configuration Debug \
            -destination "platform=iOS Simulator,name=iPhone 16 Pro,OS=latest" \
            -only-testing:LuminaVaultClientTests \
            -resultBundlePath TestResults.xcresult

      - name: Export coverage JSON
        if: always()
        run: |
          set -euo pipefail
          if [[ -d TestResults.xcresult ]]; then
            xcrun xccov view --report --json TestResults.xcresult > coverage.json || true
          else
            echo "::notice::no xcresult bundle; skipping coverage export"
            : > coverage.json
          fi

      - name: Upload coverage artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-json
          path: coverage.json
          if-no-files-found: ignore
