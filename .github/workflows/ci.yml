name: CI

on:
  pull_request:
    branches: [main, development]
    paths-ignore:
      - "**.md"
      - "docs/**"
  push:
    branches: [main, development]
    paths-ignore:
      - "**.md"
      - "docs/**"

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-15
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint (pinned 0.63.2)
        run: brew install swiftlint
      - name: SwiftLint
        run: swiftlint lint --reporter github-actions-logging

  test:
    name: Run Tests
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # Pin Xcode — `latest-stable` drifted to 26.x with no iOS sim runtime
      # preinstalled, and IPHONEOS_DEPLOYMENT_TARGET must stay ≤ runtime OS.
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.4"

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('LuminaVaultClient.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Resolve Swift packages
        run: xcodebuild -project LuminaVaultClient.xcodeproj -resolvePackageDependencies

      - name: Pick an available iPhone simulator
        id: sim
        run: |
          set -euo pipefail
          devices_json=$(xcrun simctl list devices available --json)
          newest_runtime=$(echo "$devices_json" \
            | jq -r '.devices | keys[] | select(test("iOS"))' \
            | sort -V | tail -n 1)
          if [ -z "$newest_runtime" ]; then
            echo "::error::no iOS runtime installed"
            xcrun simctl list runtimes
            exit 1
          fi
          udid=$(echo "$devices_json" \
            | jq -r --arg rt "$newest_runtime" \
                '.devices[$rt][]
                 | select(.isAvailable == true and (.name | test("iPhone")))
                 | .udid' \
            | head -n 1)
          name=$(echo "$devices_json" \
            | jq -r --arg rt "$newest_runtime" \
                '.devices[$rt][]
                 | select(.isAvailable == true and (.name | test("iPhone")))
                 | .name' \
            | head -n 1)
          os_version=$(echo "$newest_runtime" | sed -E 's/.*iOS-([0-9-]+)$/\1/' | tr '-' '.')
          if [ -z "$udid" ]; then
            device_type=$(xcrun simctl list devicetypes --json \
              | jq -r '.devicetypes[] | select(.name | test("iPhone 16")) | .identifier' \
              | head -n 1)
            runtime_id=$(xcrun simctl list runtimes --json \
              | jq -r --arg rt "$newest_runtime" \
                  '.runtimes[] | select(.name == $rt and .isAvailable == true) | .identifier')
            if [ -z "$device_type" ] || [ -z "$runtime_id" ]; then
              echo "::error::cannot create simulator; missing device type or runtime"
              exit 1
            fi
            udid=$(xcrun simctl create "CI iPhone" "$device_type" "$runtime_id")
            name="CI iPhone"
          fi
          echo "udid=$udid" >> "$GITHUB_OUTPUT"
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "os=$os_version" >> "$GITHUB_OUTPUT"
          echo "Selected simulator: $name ($udid) iOS $os_version"

      - name: Boot simulator and verify xcodebuild destination
        run: |
          set -euo pipefail
          udid="${{ steps.sim.outputs.udid }}"
          xcrun simctl boot "$udid" 2>/dev/null || true
          xcrun simctl bootstatus "$udid" -b
          destinations=$(xcodebuild -project LuminaVaultClient.xcodeproj \
            -scheme LuminaVaultClient \
            -showdestinations 2>&1 || true)
          echo "$destinations" | grep -i "ios simulator" || true
          if ! echo "$destinations" | grep -q "$udid"; then
            echo "::error::xcodebuild does not list simulator $udid — check deployment target vs runtime"
            echo "$destinations"
            exit 1
          fi

      - name: Run unit tests (Debug)
        run: |
          set -euo pipefail
          xcodebuild test \
            -project LuminaVaultClient.xcodeproj \
            -scheme LuminaVaultClient \
            -configuration Debug \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}" \
            -only-testing:LuminaVaultClientTests \
            -resultBundlePath TestResults.xcresult

      - name: Export coverage JSON
        if: always()
        run: |
          set -euo pipefail
          if [[ -d TestResults.xcresult ]]; then
            xcrun xccov view --report --json TestResults.xcresult > coverage.json || true
          else
            echo "::notice::no xcresult bundle; skipping coverage export"
            : > coverage.json
          fi

      - name: Upload coverage artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-json
          path: coverage.json
          if-no-files-found: ignore
