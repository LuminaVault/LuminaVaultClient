name: CI

on:
  pull_request:
    branches: [main, development]
    paths-ignore:
      - "**.md"
      - "docs/**"
  push:
    branches: [main, development]
    paths-ignore:
      - "**.md"
      - "docs/**"

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-15
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint (pinned)
        run: |
          set -euo pipefail
          curl -fsSL -o swiftlint.zip \
            "https://github.com/realm/SwiftLint/releases/download/0.63.2/portable_swiftlint.zip"
          unzip -o swiftlint.zip -d /tmp/swiftlint
      - name: SwiftLint
        run: /tmp/swiftlint/swiftlint lint --reporter github-actions-logging

  test:
    name: Run Tests
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # Pin Xcode — `latest-stable` drifted to 26.x with no iOS sim runtime
      # preinstalled, and IPHONEOS_DEPLOYMENT_TARGET must stay ≤ runtime OS.
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.4"

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('LuminaVaultClient.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Resolve Swift packages
        run: xcodebuild -project LuminaVaultClient.xcodeproj -resolvePackageDependencies

      # Pinned destination: with Xcode fixed at 16.4, "OS=latest" resolves to the
      # runtime that ships with that Xcode (iOS 18.x) — deterministic per pin,
      # and it fails LOUDLY if the device/runtime is missing instead of the old
      # dynamic-discovery guard that exit-1'd on runner image drift.
      - name: List simulator runtimes (diagnostics only)
        run: xcrun simctl list runtimes

      - name: Run unit tests (Debug)
        run: |
          set -euo pipefail
          xcodebuild test \
            -project LuminaVaultClient.xcodeproj \
            -scheme LuminaVaultClient \
            -configuration Debug \
            -destination "platform=iOS Simulator,name=iPhone 16 Pro,OS=latest" \
            -only-testing:LuminaVaultClientTests \
            -resultBundlePath TestResults.xcresult

      - name: Export coverage JSON
        if: always()
        run: |
          set -euo pipefail
          if [[ -d TestResults.xcresult ]]; then
            xcrun xccov view --report --json TestResults.xcresult > coverage.json || true
          else
            echo "::notice::no xcresult bundle; skipping coverage export"
            : > coverage.json
          fi

      - name: Upload coverage artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-json
          path: coverage.json
          if-no-files-found: ignore
