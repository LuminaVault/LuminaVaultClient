name: CI

on:
  pull_request:
    branches: [main, development]
    paths-ignore:
      - "**.md"
      - "docs/**"
  push:
    branches: [main, development]
    paths-ignore:
      - "**.md"
      - "docs/**"

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: SwiftLint
        run: swiftlint lint --reporter github-actions-logging

  test:
    name: Run Tests
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('LuminaVaultClient.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Resolve Swift packages
        run: xcodebuild -project LuminaVaultClient.xcodeproj -resolvePackageDependencies

      - name: Install iOS simulator runtime
        run: |
          # Xcode 26.x runners ship without the iOS Simulator runtime
          # preinstalled — only visionOS. Download it on demand.
          sudo xcodebuild -downloadPlatform iOS

      - name: Pick an available iPhone simulator
        id: sim
        run: |
          # Pick newest iOS runtime, then first available iPhone in it.
          # Return UDID — xcodebuild cannot resolve name+OS=latest when the
          # newest runtime has no pre-created simulator instance.
          devices_json=$(xcrun simctl list devices available --json)
          newest_runtime=$(echo "$devices_json" \
            | jq -r '.devices | keys[] | select(test("iOS"))' \
            | sort -V | tail -n 1)
          if [ -z "$newest_runtime" ]; then
            echo "::error::no iOS runtime installed"
            xcrun simctl list runtimes
            exit 1
          fi
          udid=$(echo "$devices_json" \
            | jq -r --arg rt "$newest_runtime" \
                '.devices[$rt][]
                 | select(.isAvailable == true and (.name | test("iPhone")))
                 | .udid' \
            | head -n 1)
          name=$(echo "$devices_json" \
            | jq -r --arg rt "$newest_runtime" \
                '.devices[$rt][]
                 | select(.isAvailable == true and (.name | test("iPhone")))
                 | .name' \
            | head -n 1)
          if [ -z "$udid" ]; then
            # Newest iOS runtime has no iPhone — create one.
            device_type=$(xcrun simctl list devicetypes --json \
              | jq -r '.devicetypes[] | select(.name | test("iPhone")) | .identifier' \
              | sort -V | tail -n 1)
            runtime_id=$(xcrun simctl list runtimes --json \
              | jq -r --arg rt "$newest_runtime" \
                  '.runtimes[] | select(.name == $rt and .isAvailable == true) | .identifier')
            if [ -z "$device_type" ] || [ -z "$runtime_id" ]; then
              echo "::error::cannot create simulator; missing device type or runtime"
              xcrun simctl list devices available
              xcrun simctl list runtimes
              exit 1
            fi
            udid=$(xcrun simctl create "CI iPhone" "$device_type" "$runtime_id")
            name=$(xcrun simctl list devices --json \
              | jq -r --arg u "$udid" \
                  '.devices[][] | select(.udid == $u) | .name')
            echo "Created simulator: $name ($udid) in $newest_runtime"
          fi
          echo "udid=$udid" >> "$GITHUB_OUTPUT"
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "Selected simulator: $name ($udid) in $newest_runtime"

      - name: Run unit tests (Debug, with coverage)
        run: |
          xcodebuild test \
            -project LuminaVaultClient.xcodeproj \
            -scheme LuminaVaultClient \
            -configuration Debug \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}" \
            -only-testing:LuminaVaultClientTests \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults.xcresult

      - name: Export coverage JSON
        if: always()
        run: |
          set -euo pipefail
          if [[ -d TestResults.xcresult ]]; then
            xcrun xccov view --report --json TestResults.xcresult > coverage.json || true
          else
            echo "::notice::no xcresult bundle; skipping coverage export"
            : > coverage.json
          fi

      - name: Upload coverage artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-json
          path: coverage.json
          if-no-files-found: ignore
