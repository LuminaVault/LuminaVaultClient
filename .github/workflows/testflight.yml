name: TestFlight Beta

on:
  workflow_dispatch:
    inputs:
      changelog:
        description: "TestFlight changelog (shown to internal testers)"
        required: false
        default: "Latest internal build."
  push:
    branches:
      - development
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".github/**"

jobs:
  beta:
    runs-on: macos-15
    timeout-minutes: 60
    env:
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
      BUILD_NUMBER: ${{ github.run_number }}
      CHANGELOG: ${{ github.event.inputs.changelog || format('development @ {0}', github.sha) }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
      APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
      APP_STORE_CONNECT_API_KEY_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY }}
      FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD: ${{ secrets.FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('LuminaVaultClient.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Resolve Swift packages
        run: xcodebuild -project LuminaVaultClient.xcodeproj -resolvePackageDependencies

      - name: Build + upload to TestFlight
        run: bundle exec fastlane beta
