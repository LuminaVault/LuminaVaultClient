name: TestFlight Beta

on:
  workflow_dispatch:
    inputs:
      changelog:
        description: "TestFlight changelog (shown to internal testers)"
        required: false
        default: "Latest internal build."
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".github/**"

jobs:
  beta:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[testflight]')
    runs-on: macos-14
    timeout-minutes: 60
    env:
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
      BUILD_NUMBER: ${{ github.run_number }}
      CHANGELOG: ${{ github.event.inputs.changelog || format('main @ {0}', github.sha) }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
      APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
      APP_STORE_CONNECT_API_KEY_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY }}
      FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD: ${{ secrets.FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26.4
        run: sudo xcode-select -s /Applications/Xcode_26.4.app

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('LuminaVaultClient.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: SwiftLint
        run: swiftlint lint --reporter github-actions-logging

      - name: Resolve Swift packages
        run: xcodebuild -project LuminaVaultClient.xcodeproj -resolvePackageDependencies

      - name: Run unit tests (Debug, with coverage)
        run: |
          xcodebuild test \
            -project LuminaVaultClient.xcodeproj \
            -scheme LuminaVaultClient \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -only-testing:LuminaVaultClientTests \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults.xcresult

      - name: Export coverage JSON
        # Best-effort; informational only until we wire a dashboard.
        if: always()
        run: |
          set -euo pipefail
          if [[ -d TestResults.xcresult ]]; then
            xcrun xccov view --report --json TestResults.xcresult > coverage.json || true
          else
            echo "::notice::no xcresult bundle; skipping coverage export"
            : > coverage.json
          fi

      - name: Upload coverage artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-json
          path: coverage.json
          if-no-files-found: ignore

      - name: Build + upload to TestFlight
        run: bundle exec fastlane beta
