# SwiftLint configuration — conservative baseline.
#
# Mirrors the server's `.swiftlint.yml`. Style-only rules are disabled
# (SwiftFormat owns those); structural rules like force_unwrapping,
# unused_import, and explicit_init are the active surface.

included:
  - LuminaVaultClient
  - LuminaVaultClientTests
  - LuminaVaultClientUITests

excluded:
  - .build
  - "**/.build"
  - LuminaVaultClient.xcodeproj
  - "**/__Snapshots__"

disabled_rules:
  - trailing_whitespace
  - trailing_newline
  - opening_brace
  - line_length
  - identifier_name
  - todo
  - cyclomatic_complexity
  - function_body_length
  - type_body_length
  - file_length
  - large_tuple
  - nesting

opt_in_rules:
  - force_unwrapping
  - empty_count
  - empty_string
  - explicit_init
  - first_where
  - last_where
  - sorted_first_last
  - contains_over_first_not_nil
  - unused_import
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces

force_unwrapping:
  severity: warning

trailing_comma:
  mandatory_comma: true
